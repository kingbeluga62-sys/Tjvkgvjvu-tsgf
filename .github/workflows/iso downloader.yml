name: ISO & Media Downloader

on:
  workflow_dispatch:
    inputs:
      selections:
        description: "Comma-separated list of ISOs or tools to download (e.g., Ubuntu Latest, Windows 10 Media Creation Tool, Kali Latest)"
        required: true
        default: "Ubuntu Latest, Debian Latest, Windows 10, Tiny11 Latest, Fedora Server Latest"

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up selection
        run: |
          echo "SELECTIONS=${{ github.event.inputs.selections }}" >> $GITHUB_ENV

      - name: Download ISOs / Tools
        run: |
          IFS=',' read -ra choices <<< "$SELECTIONS"
          for raw in "${choices[@]}"; do
            item=$(echo "$raw" | xargs)
            case "$item" in

              # --- Linux Desktop & Server ---
              "Ubuntu")
                URL="https://releases.ubuntu.com/noble/ubuntu-24.04.4-desktop-amd64.iso"
                OUT="ubuntu-24.04-desktop.iso"
                ;;
              "Debian Latest")
                URL="https://cdimage.debian.org/debian-cd/current/amd64/iso-dvd/debian-12.9.0-amd64-DVD-1.iso"
                OUT="debian-12-desktop.iso"
                ;;
              "Fedora Workstation Latest")
                URL="https://download.fedoraproject.org/pub/fedora/linux/releases/40/Workstation/x86_64/iso/Fedora-Workstation-Live-x86_64-40-1.7.iso"
                OUT="fedora-workstation-40.iso"
                ;;
              "Fedora Server Latest")
                URL="https://download.fedoraproject.org/pub/fedora/linux/releases/40/Server/x86_64/iso/Fedora-Server-40-x86_64-1.7.iso"
                OUT="fedora-server-40.iso"
                ;;
              "Arch Linux Latest")
                URL="https://mirror.rackspace.com/archlinux/iso/latest/archlinux-x86_64.iso"
                OUT="archlinux-latest.iso"
                ;;
              "Kali Latest")
                URL="https://cdimage.kali.org/kali-2025.1/kali-linux-2025.1-live-amd64.iso"
                OUT="kali-2025.1.iso"
                ;;
              "Linux Mint Latest")
                URL="https://mirrors.edge.kernel.org/linuxmint/stable/21.2/linuxmint-21.2-cinnamon-64bit.iso"
                OUT="linuxmint-21.2.iso"
                ;;
              "Pop!_OS Latest")
                URL="https://system76.com/pop-download/24.04/pop-os_24.04_amd64_Desktop.iso"
                OUT="popos-24.04.iso"
                ;;
              "openSUSE Leap Latest")
                URL="https://download.opensuse.org/distribution/leap/15.5/iso/openSUSE-Leap-15.5-DVD-x86_64.iso"
                OUT="opensuse-leap-15.5.iso"
                ;;
              "CentOS Stream Latest")
                URL="http://mirror.stream.centos.org/9-stream/BaseOS/x86_64/iso/CentOS-Stream-9-x86_64-boot.iso"
                OUT="centos-stream-9.iso"
                ;;
              "AlmaLinux Latest")
                URL="https://repo.almalinux.org/almalinux/9/isos/x86_64/AlmaLinux-9.3-x86_64-dvd.iso"
                OUT="almalinux-9.3.iso"
                ;;
              "Rocky Linux Latest")
                URL="https://dl.rockylinux.org/vault/rocky/9.6/isos/x86_64/Rocky-9.6-x86_64-dvd.iso"
                OUT="rocky-9.6.iso"
                ;;
              "Alpine Latest")
                URL="https://dl-cdn.alpinelinux.org/alpine/v3.21/releases/x86_64/alpine-standard-3.21.0-x86_64.iso"
                OUT="alpine-3.21.iso"
                ;;

              # --- Windows ---
              "Windows 11")
                URL="https://software-download.microsoft.com/dbx/Win11_22H2_English_x64.iso"
                OUT="Win11.iso"
                ;;
              "Windows 10")
                URL="https://software-download.microsoft.com/pr/Win10_22H2_English_x64.iso"
                OUT="Win10.iso"
                ;;
              "Windows 8.1")
                URL="https://software-download.microsoft.com/dbx/Windows8.1_English_x64.iso"
                OUT="Win8.1.iso"
                ;;
              "Windows 7")
                URL="https://software-download.microsoft.com/pr/Win7_English_x64.iso"
                OUT="Win7.iso"
                ;;
              "Windows XP")
                URL="https://software-download.microsoft.com/dbx/Windows_XP_SP3.iso"
                OUT="WinXP_SP3.iso"
                ;;
              "Tiny10 Latest")
                URL="https://fast.download.example.com/tiny10-latest.iso"
                OUT="tiny10-latest.iso"
                ;;
              "Tiny11 Latest")
                URL="https://fast.download.example.com/tiny11-latest.iso"
                OUT="tiny11-latest.iso"
                ;;

              # --- Windows Media Creation Tools / USB flashable tools ---
              "Win10 Media")
                URL="https://go.microsoft.com/fwlink/?LinkId=691209"  # official Microsoft link
                OUT="MediaCreationToolWin10.exe"
                ;;
              "Win11 Media")
                URL="https://go.microsoft.com/fwlink/?linkid=2156295"  # official Microsoft link
                OUT="MediaCreationToolWin11.exe"
                ;;

              *)
                echo "Unknown selection: $item"
                continue
                ;;
            esac

            echo "Downloading $item..."
            curl -L -o "$OUT" "$URL" || echo "Failed to download $item"
          done

      - name: Upload all downloads as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-isos-tools
          path: "*.iso"
