name: ISO & Media Downloader

on:
  workflow_dispatch:
    inputs:
      selections:
        description: "Comma-separated list of ISOs or tools to download (e.g., Ubuntu Latest, Windows 10 Media Creation Tool, Kali Latest)"
        required: true
        default: "Ubuntu Latest, Debian Latest, Windows 10, Tiny11 Latest, Fedora Server Latest"

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up selection
        run: |
          echo "SELECTIONS=${{ github.event.inputs.selections }}" >> $GITHUB_ENV

      - name: Download ISOs / Tools
        run: |
          IFS=',' read -ra choices <<< "$SELECTIONS"
          for raw in "${choices[@]}"; do
            item=$(echo "$raw" | xargs)
            case "$item" in

              # --- Linux Desktop & Server ---
              "Ubuntu")
                URL="https://releases.ubuntu.com/noble/ubuntu-24.04.4-desktop-amd64.iso"
                OUT="ubuntu-x64.iso"
                ;;
              "Debian Latest")
                URL="https://cdimage.debian.org/debian-cd/current/amd64/iso-cd/debian-13.4.0-amd64-netinst.iso"
                OUT="debian-13-x64.iso"
                ;;
              "Fedora")
                URL="https://download.fedoraproject.org/pub/fedora/linux/releases/43/KDE/x86_64/iso/Fedora-KDE-Desktop-Live-43-1.6.x86_64.iso"
                OUT="fedora-43-x86_64.iso"
                ;;
              "Fedora Server")
                URL="https://download.fedoraproject.org/pub/fedora/linux/releases/43/Server/x86_64/iso/Fedora-Server-dvd-x86_64-43-1.6.iso"
                OUT="fedora-server-43-x86_64.iso"
                ;;
              "Arch")
                URL="https://techloudgeek.com/download/image/?link=https://dlconusc1.linuxvmimages.com/046389e06777452db2ccf9a32efa3760:virtualbox/A/archlinux/ArchLinux_2022_VB.7z"
                OUT="arch-virtualbox-image.7z"
                ;;
              "Kali")
                URL="https://cdimage.kali.org/kali-2025.4/kali-linux-2025.4-installer-netinst-amd64.iso"
                OUT="kali-2025.4-x64.iso"
                ;;
              "Mint")
                URL="https://pub.linuxmint.io/stable/22.3/linuxmint-22.3-cinnamon-64bit.iso"
                OUT="linuxmint-21.2.iso"
                ;;
              "Lubuntu")
                URL="https://cdimage.ubuntu.com/lubuntu/releases/noble/release/lubuntu-24.04.4-desktop-amd64.iso"
                OUT="lubuntu-x64.iso"
                ;;

              # --- Windows ---
              "Windows 11")
                URL="https://trashbytes.net/dl/oiwANc40fd3VxKfkbbHzHUFRCSJkXYQ_s04jVVDm9c52Q40vfsvgUqfxGD6K4c8nhgkcSPOWsgFqqq5a4VSLLBjjWcT0Cwd3M98WKwCLTuha7Tkg_1XdybSfIV-fO-kG0rf2kq725Ln9AOaoIDW-4qDLGuLYjsybXDjum5t630BeRw?v=1774276062-D%2FvzEcWr2%2Ft1c88ALFa0ilaAXpIrPGFZuTFVbb%2FyD6o%3D"
                OUT="Win11-IoT-x64.iso"
                ;;
              "Windows 10 x64")
                URL="https://trashbytes.net/dl/BibA3G7Bn4Uf-5sLSWw090w1FBy1EbYyadLSKweMqhTdppaL3mx_7A18rb9zcMA25oytiD16NlWLS8VkToQ1kJz1c7ZNlycAK0a8jaH4x6hROLGQcS72sb1miHSxchKecIt3xA5sMiDSJ6vokBnHKIoJKzOFtDDKXnn5XcIDfkfuoQ?v=1774275890-%2Fzsm0I6Fp7cGTc%2BLZ7AlHJqk%2F78bG2Mfjt4eiXeY9VI%3D"
                OUT="Win10-x64.iso"
                ;;
              "Windows 10 x86")
                URL="https://trashbytes.net/dl/G4MHJDfxwHjPbZjk1Glf1WdF0UP6Eq9LseVpol060Y3HEnfeRNOMxdBgx2FK6hSWSugSnrjgWuplnt3P3mLlMD6lmtghpLCCW2UfaMYA5vBLJOw1OBykQzcBtGW312o5c467vrgzmq990M8XO_5eWt-JPCOydugJQo1OnyDZ?v=1774275991-19b1dkIk4Qxo4SLjDGCNVM5nGgN5wGGJxT0SFndpM6Q%3D"
                OUT="Win10-x86.iso"
                ;;
              "Windows 8.1")
                URL="https://software-download.microsoft.com/dbx/Windows8.1_English_x64.iso"
                OUT="Win8.1.iso"
                ;;
              "Windows 7")
                URL="https://software-download.microsoft.com/pr/Win7_English_x64.iso"
                OUT="Win7.iso"
                ;;
              "Windows XP")
                URL="https://archive.org/download/WinXPProSP3x86/en_windows_xp_professional_with_service_pack_3_x86_cd_vl_x14-73974.iso"
                OUT="WinXP-SP3.iso"
                ;;
              "Tiny10 Latest")
                URL="https://fast.download.example.com/tiny10-latest.iso"
                OUT="tiny10-latest.iso"
                ;;
              "Tiny11 Latest")
                URL="https://fast.download.example.com/tiny11-latest.iso"
                OUT="tiny11-latest.iso"
                ;;

              # --- Windows Media Creation Tools / USB flashable tools ---
              "Win10 Media")
                URL="https://go.microsoft.com/fwlink/?LinkId=691209"  # official Microsoft link
                OUT="MediaCreationToolWin10.exe"
                ;;
              "Win11 Media")
                URL="https://go.microsoft.com/fwlink/?linkid=2156295"  # official Microsoft link
                OUT="MediaCreationToolWin11.exe"
                ;;

              *)
                echo "Unknown selection: $item"
                continue
                ;;
            esac

            echo "Downloading $item..."
            curl -L -o "$OUT" "$URL" || echo "Failed to download $item"
          done

      - name: Upload all downloads as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-isos-tools
          path: "*.iso"
